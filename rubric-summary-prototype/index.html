<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Observation Summary — Brandon Sanderson, Lecture #1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --background:     #F7F8FA;
      --surface:        #FFFFFF;
      --border:         #E2E6EA;
      --text-primary:   #1A1F2E;
      --text-secondary: #5A6478;
      --accent:         #2E4E6B;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--background);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── PAGE HEADER ─────────────────────────────── */

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 13px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .page-header-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      letter-spacing: 0.01em;
    }

    .page-header-meta {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 400;
    }

    /* ─── PANELS ──────────────────────────────────── */

    .panels {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex: none;
    }

    .panel-left  { width: 50%; }
    .panel-right { flex: 1; }

    /* ─── RESIZE DIVIDER ──────────────────────────── */

    .divider {
      width: 5px;
      flex-shrink: 0;
      cursor: col-resize;
      background: var(--border);
      position: relative;
      transition: background 0.15s;
    }

    .divider:hover,
    .divider.dragging {
      background: var(--accent);
    }

    .divider::after {
      content: '';
      position: absolute;
      inset: 0 -4px;
    }

    /* ─── PANEL HEADERS ───────────────────────────── */

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 24px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .panel-right-controls {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .edit-hint {
      font-size: 13px;
      color: var(--text-secondary);
      display: none;
      align-items: center;
      gap: 5px;
    }

    .edit-hint.visible {
      display: flex;
    }

    .edit-hint-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #C8A84B;
      flex-shrink: 0;
    }

    /* ─── GENERATE BUTTON ─────────────────────────── */

    .btn-generate {
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.03em;
      color: #FFFFFF;
      background: var(--accent);
      border: none;
      padding: 6px 14px;
      cursor: pointer;
      transition: opacity 0.15s;
      border-radius: 2px;
      white-space: nowrap;
    }

    .btn-generate:hover:not(:disabled) {
      opacity: 0.85;
    }

    .btn-generate:disabled {
      opacity: 0.45;
      cursor: default;
    }

    /* ─── SCROLLABLE BODIES ───────────────────────── */

    .panel-body {
      overflow-y: auto;
      flex: 1;
    }

    .panel-body::-webkit-scrollbar,
    .summary-area::-webkit-scrollbar {
      width: 3px;
    }

    .panel-body::-webkit-scrollbar-track,
    .summary-area::-webkit-scrollbar-track {
      background: transparent;
    }

    .panel-body::-webkit-scrollbar-thumb,
    .summary-area::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    /* ─── OBSERVATION CARDS ───────────────────────── */

    .obs-card {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
    }

    .obs-card:last-child {
      border-bottom: none;
    }

    .obs-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 9px;
    }

    .obs-timestamp {
      font-size: 13px;
      font-weight: 400;
      font-variant-numeric: tabular-nums;
      color: var(--text-secondary);
      font-family: 'IBM Plex Mono', monospace;
      flex-shrink: 0;
    }

    .obs-component {
      font-size: 14px;
      color: var(--text-primary);
      font-weight: 500;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .obs-text {
      font-size: 15px;
      line-height: 1.65;
      color: var(--text-primary);
    }

    /* ─── RATING PILLS ────────────────────────────── */

    .rating-pill {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 2px;
      border: 1px solid currentColor;
      background: transparent;
      flex-shrink: 0;
    }

    .rating-distinguished  { color: #8B2E2E; }
    .rating-proficient     { color: #2E5F3E; }
    .rating-basic          { color: #8B6914; }
    .rating-unsatisfactory { color: #5A5A5A; }

    /* ─── SUMMARY AREA ────────────────────────────── */

    .summary-area {
      flex: 1;
      overflow-y: auto;
      padding: 28px 28px 40px;
      outline: none;
      caret-color: var(--accent);
    }

    .summary-area:empty::before {
      content: 'No summary generated yet. Click "Generate Summary" to begin.';
      color: var(--text-secondary);
      font-size: 15px;
      font-style: italic;
      pointer-events: none;
    }

    /* ─── SUMMARY CONTENT ─────────────────────────── */

    .summary-domain {
      margin-bottom: 30px;
    }

    .summary-domain-label {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      padding-bottom: 10px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .summary-component {
      margin-bottom: 18px;
    }

    .summary-component:last-of-type {
      margin-bottom: 0;
    }

    .summary-component-header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      margin-bottom: 10px;
    }

    .summary-component-name {
      font-size: 18px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .summary-narrative {
      font-size: 16px;
      font-weight: 400;
      line-height: 1.7;
      color: var(--text-primary);
    }

    .summary-disclaimer {
      margin-top: 32px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      line-height: 1.65;
      color: var(--text-secondary);
      font-style: italic;
    }

    /* ─── ENTRANCE ANIMATIONS ─────────────────────── */

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .summary-domain {
      animation: fadeUp 0.5s cubic-bezier(0.23, 1, 0.32, 1) both;
    }

    .summary-domain:nth-child(1) { animation-delay: 0.04s; }
    .summary-domain:nth-child(2) { animation-delay: 0.12s; }
    .summary-domain:nth-child(3) { animation-delay: 0.20s; }
    .summary-domain:nth-child(4) { animation-delay: 0.28s; }

    .summary-disclaimer {
      animation: fadeUp 0.5s cubic-bezier(0.23, 1, 0.32, 1) both;
      animation-delay: 0.34s;
    }

  </style>
</head>
<body>

  <header class="page-header">
    <span class="page-header-title">Observation Summary — Brandon Sanderson, Lecture #1</span>
    <span class="page-header-meta">Evaluator: Maria Vasquez · March 8, 2023 · Danielson 2013</span>
  </header>

  <div class="panels">

    <!-- LEFT PANEL -->
    <div class="panel panel-left">
      <div class="panel-header">
        <span class="panel-label">Observation Notes</span>
        <span style="font-size:12px;color:var(--text-secondary);">8 notes</span>
      </div>
      <div class="panel-body" id="obs-list"></div>
    </div>

    <div class="divider" id="divider"></div>

    <!-- RIGHT PANEL -->
    <div class="panel panel-right">
      <div class="panel-header">
        <span class="panel-label">AI Summary</span>
        <div class="panel-right-controls">
          <span class="edit-hint" id="edit-hint">
            <span class="edit-hint-dot"></span>
            Editable — click to revise
          </span>
          <button class="btn-generate" id="btn-generate">Generate Summary</button>
        </div>
      </div>
      <div class="summary-area" id="summary-area" spellcheck="true"></div>
    </div>

  </div>

  <script>
    // ─── DATA ────────────────────────────────────────

    const observations = [
      {
        time: '00:04',
        text: 'Opens without notes or slides. Establishes the scope of the course directly and with confidence. Students visibly attentive from the first minute.',
        component: '1a — Demonstrating Knowledge of Content and Pedagogy',
        rating: 'Distinguished'
      },
      {
        time: '08:45',
        text: 'Uses a specific example from his own publication history to illustrate the difference between plot-driven and character-driven narrative. Example is precise, not generic.',
        component: '1a — Demonstrating Knowledge of Content and Pedagogy',
        rating: 'Distinguished'
      },
      {
        time: '14:22',
        text: 'Pauses to ask the room whether they\'ve encountered this distinction before. Three students respond. Does not redirect students who are off-topic — lets the tangent run longer than useful.',
        component: '3b — Using Questioning and Discussion Techniques',
        rating: 'Basic'
      },
      {
        time: '24:10',
        text: 'Reframes a student\'s confused question back to them in clearer terms before answering. Student visibly re-engages.',
        component: '3b — Using Questioning and Discussion Techniques',
        rating: 'Proficient'
      },
      {
        time: '31:55',
        text: 'Room is large; students in the back rows are not acknowledged during discussion. No visible strategy for ensuring equitable participation across the space.',
        component: '2a — Creating an Environment of Respect and Rapport',
        rating: 'Basic'
      },
      {
        time: '44:30',
        text: 'Transitions from lecture to open Q&A with a clear signal and restatement of the session\'s core idea. Students who had not previously participated begin asking questions.',
        component: '3c — Engaging Students in Learning',
        rating: 'Proficient'
      },
      {
        time: '52:18',
        text: 'Responds to a question about writer\'s block by connecting it to a concept covered earlier in the session. Demonstrates command of how ideas in the course build on each other.',
        component: '1a — Demonstrating Knowledge of Content and Pedagogy',
        rating: 'Distinguished'
      },
      {
        time: '58:40',
        text: 'Closes without summarizing key takeaways or previewing next session. Students begin packing up before he finishes his final point.',
        component: '3c — Engaging Students in Learning',
        rating: 'Unsatisfactory'
      }
    ];

    // ─── RENDER CARDS ────────────────────────────────

    function ratingClass(rating) {
      const map = {
        'Distinguished':   'rating-distinguished',
        'Proficient':      'rating-proficient',
        'Basic':           'rating-basic',
        'Unsatisfactory':  'rating-unsatisfactory'
      };
      return map[rating] || '';
    }

    const obsList = document.getElementById('obs-list');

    observations.forEach(obs => {
      const card = document.createElement('div');
      card.className = 'obs-card';
      card.innerHTML = `
        <div class="obs-meta">
          <span class="obs-timestamp">${obs.time}</span>
          <span class="obs-component">${obs.component}</span>
          <span class="rating-pill ${ratingClass(obs.rating)}">${obs.rating}</span>
        </div>
        <p class="obs-text">${obs.text}</p>
      `;
      obsList.appendChild(card);
    });

    // ─── SUMMARY CONTENT ─────────────────────────────

    const summaryHTML = `
      <div class="summary-domain">
        <div class="summary-domain-label">Domain 1 — Planning and Preparation</div>
        <div class="summary-component">
          <div class="summary-component-header">
            <span class="rating-pill rating-distinguished">Distinguished</span>
            <span class="summary-component-name">1a — Demonstrating Knowledge of Content and Pedagogy</span>
          </div>
          <p class="summary-narrative">Sanderson demonstrates exceptional content knowledge across three distinct moments in the session. He opened without notes or slides, establishing scope with evident confidence. He drew on a precise example from his own publication history — not as biography, but as instructional leverage — to illuminate a nuanced distinction between narrative modes. Late in the session, when a student raised a question about writer's block, he connected the response to a concept introduced earlier, demonstrating not only deep subject mastery but an awareness of how ideas in the course accumulate over time. All three observed moments reflect Distinguished practice. The preponderance of evidence supports Distinguished for this component.</p>
        </div>
      </div>

      <div class="summary-domain">
        <div class="summary-domain-label">Domain 2 — The Classroom Environment</div>
        <div class="summary-component">
          <div class="summary-component-header">
            <span class="rating-pill rating-basic">Basic</span>
            <span class="summary-component-name">2a — Creating an Environment of Respect and Rapport</span>
          </div>
          <p class="summary-narrative">Individual student interactions were handled with care — one standout moment involved reframing a confused student's question back to them in clearer terms, which visibly re-engaged the student. However, the overall distribution of attention across the room was uneven. In a large classroom, students in back rows were not acknowledged during discussion, and no visible strategy existed for ensuring equitable participation across the physical space. A single strong individual interaction cannot compensate for a structural absence of whole-room engagement. The evidence supports Basic for this component.</p>
        </div>
      </div>

      <div class="summary-domain">
        <div class="summary-domain-label">Domain 3 — Instruction</div>
        <div class="summary-component">
          <div class="summary-component-header">
            <span class="rating-pill rating-proficient">Proficient</span>
            <span class="summary-component-name">3b — Using Questioning and Discussion Techniques</span>
          </div>
          <p class="summary-narrative">Evidence in this component is mixed. The reframing of a student's confused question was a purposeful facilitation move with a clear positive outcome — it demonstrated real-time responsiveness to individual comprehension. However, an earlier discussion moment showed a tangent running longer than was instructionally useful, with no visible attempt to redirect. These two instances suggest inconsistency rather than a stable practice. The stronger moment, in the absence of a broader pattern of weak facilitation, places this component at Proficient. A more deliberate strategy for managing discussion direction would support growth toward Distinguished.</p>
        </div>
        <div class="summary-component">
          <div class="summary-component-header">
            <span class="rating-pill rating-basic">Basic</span>
            <span class="summary-component-name">3c — Engaging Students in Learning</span>
          </div>
          <p class="summary-narrative">This component contains the session's strongest instructional move and its most significant gap. The transition from lecture to open Q&A at 44:30 was executed with a clear signal and a restatement of the session's core idea, drawing in students who had not previously participated — a Proficient-level moment. Set against this, the session closed without a summary of key takeaways or any preview of the next session; students began packing up before the final point was complete. The absence of a closing structure undermines the instructional arc of the session as a whole. Given the weight of the closing moment in a learning sequence, the evidence trends toward Basic.</p>
        </div>
      </div>

      <p class="summary-disclaimer">This summary was drafted using an AI-assisted observation tool based on timestamped evaluator notes. Ratings reflect documented observations for this session only and do not constitute a final evaluation. All narrative text and ratings should be reviewed and edited by the evaluator before submission or use in any formal evaluation record.</p>
    `;

    // ─── RESIZE DIVIDER ──────────────────────────────

    const divider   = document.getElementById('divider');
    const panelLeft = document.querySelector('.panel-left');
    const panels    = document.querySelector('.panels');

    divider.addEventListener('mousedown', e => {
      e.preventDefault();
      divider.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';

      const onMove = e => {
        const panelsRect = panels.getBoundingClientRect();
        const minPx = 240;
        const maxPx = panelsRect.width - 240 - divider.offsetWidth;
        const newWidth = Math.min(maxPx, Math.max(minPx, e.clientX - panelsRect.left));
        panelLeft.style.width = newWidth + 'px';
      };

      const onUp = () => {
        divider.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    // ─── BUTTON INTERACTION ───────────────────────────

    const btn = document.getElementById('btn-generate');
    const summaryArea = document.getElementById('summary-area');
    const editHint = document.getElementById('edit-hint');

    btn.addEventListener('click', () => {
      btn.disabled = true;
      btn.textContent = 'Generating…';

      setTimeout(() => {
        summaryArea.innerHTML = summaryHTML;
        summaryArea.setAttribute('contenteditable', 'true');
        editHint.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Regenerate';
      }, 1500);
    });
  </script>

</body>
</html>
